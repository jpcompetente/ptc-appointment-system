<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/signup.css">
    <title>PTC Web System | Login</title>
</head>
<body>
    <div class="container" id="container">
        <div class="form-container sign-up">
            <form action="signup.php" method="post">
                <h1>Create Account</h1>
                <span>Use your school email for registration</span>
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="School Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in">
            <form action="signin.php" method="post">
                <h1>Sign In</h1>
                <span>Use your school email and password</span>
                <input type="email" name="email" placeholder="School Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <a href="#">Forgot Your Password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <img src="images/logo-ptc 2.png" alt="PTC Logo" class="toggle-logo">
                    <h1>Welcome Back!</h1>
                    <p>Sign in with your institutional account to access all system features</p>
                    <button class="hidden" id="login">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <img src="images/logo-ptc 2.png" alt="PTC Logo" class="toggle-logo">
                    <h1>Registrar Access</h1>
                    <p>Register with your institutional account to access all system features</p>
                    <button class="hidden" id="register">Sign Up</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/signup.js"></script>
</body>
</html>
